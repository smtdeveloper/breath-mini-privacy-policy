## Breath Mini Gizlilik Politikası

Yürürlük Tarihi: 28/03/2026

Breath Mini, kullanıcı gizliliğini korumayı taahhüt eder. Bu politika, uygulamayı kullanırken verilerin nasıl işlendiğini açıklar.

---

## 1. Genel Bilgi

Breath Mini, nefes egzersizi ve rahatlama amaçlı bir uygulamadır.
**Tıbbi bir uygulama değildir.**

---

## 2. Toplanan Veriler

Kişisel veri (isim, e-posta vb.) toplamayız.

### a) Uygulama Ayarları

* Dil seçimi
* Ses ayarları
* Hatırlatıcılar
* Pro satın alma durumu

Bu veriler **cihazınızda saklanır**.

---

### b) Kullanım Verileri

Uygulama deneyimini geliştirmek için anonim analiz verileri kullanılabilir:

* kullanım süresi
* özellik kullanımı

---

### c) Reklam Verileri

Uygulamada reklam gösterilebilir.

Reklam sağlayıcılar:

* cihaz bilgisi
* yaklaşık konum
  gibi verileri kullanabilir.

---

## 3. Satın Alma

Tek seferlik Pro satın alma sunulmaktadır.

Ödeme işlemleri:

* App Store
* Google Play

tarafından yönetilir.

---

## 4. Bildirimler

Uygulama yerel bildirimler gönderebilir.
Bu bildirimler cihaz üzerinde çalışır.

---

## 5. Veri Paylaşımı

Kişisel veri satışı yapılmaz.

---

## 6. Güvenlik

Verilerin korunması için önlemler alınır.

---

## 7. Çocuklar

13 yaş altı kullanıcılar hedeflenmez.

---

## 8. Haklarınız

* Bildirimleri kapatabilirsiniz
* Uygulamayı silebilirsiniz

---

## 9. Güncellemeler

Politika zamanla güncellenebilir.

