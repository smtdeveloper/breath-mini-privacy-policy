## Privacy Policy for Breath Mini

Effective Date:  28/03/2026

Breath Mini (“we”, “our”, or “the app”) is committed to protecting your privacy. This Privacy Policy explains how we handle information when you use our mobile application.

---

## 1. Overview

Breath Mini is a breathing and relaxation app designed to help users improve focus, relaxation, and well-being.
It is **not a medical application** and does not provide medical advice, diagnosis, or treatment.

---

## 2. Information We Collect

We do **not collect personally identifiable information** such as your name, email, or contacts.

However, the app may process limited data for functionality and improvement purposes:

### a) App Preferences

* Selected language
* Audio settings
* Reminder settings
* Purchased Pro status

This data is stored **locally on your device**.

---

### b) Usage Data (Analytics)

We may use third-party analytics tools to understand how users interact with the app.

This may include:

* App usage patterns
* Session duration
* Feature interactions

This data is:

* anonymized
* not personally identifiable

---

### c) Advertising Data

The app may display ads using third-party advertising networks.

These services may collect:

* Device information
* Approximate location (not precise)
* Ad interaction data

Advertising partners may use this data to provide more relevant ads.

---

## 3. In-App Purchases

Breath Mini offers a **one-time purchase (Pro version)**.

Purchases are processed securely by:

* Apple App Store
* Google Play Store

We do **not store or access your payment information**.

---

## 4. Notifications

The app may send **local notifications (reminders)**.

These:

* are scheduled on your device
* do not involve external servers
* can be disabled at any time in settings

---

## 5. Data Sharing

We do **not sell your personal data**.

We may share limited data with:

* analytics providers
* advertising partners

Only to the extent necessary for app functionality.

---

## 6. Data Security

We take reasonable measures to protect your data.
However, no system is 100% secure.

---

## 7. Children’s Privacy

Breath Mini is not intended for children under 13.
We do not knowingly collect data from children.

---

## 8. Your Choices

You can:

* disable notifications
* limit ad tracking via device settings
* uninstall the app at any time

---

## 9. Changes to This Policy

We may update this Privacy Policy.
Changes will be reflected on this page with an updated date.

---

## 10. Contact

If you have any questions, contact us at:

bensametakca@gmail.com

---

## 11. Disclaimer

Breath Mini is a wellness application only.
It is **not a medical device** and should not be used as a substitute for professional medical advice.

